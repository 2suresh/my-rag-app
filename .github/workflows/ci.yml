name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Deployment is handled automatically by Render's native GitHub integration
# (Render redeploys each service on push to its branch). API keys live in the
# Render dashboard's Environment tab — NOT in this repo and NOT in GitHub
# secrets. This workflow only runs the test suite.
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: sit
      PINECONE_INDEX_NAME: rag-sit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
